name: PR CI

on:
  pull_request:
    branches: [main]

concurrency:
  group: pr-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  unit-tests:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
      - name: Install project + test deps (editable; pytest good practices)
        run: |
          pip install pytest
          if grep -q '^\[project\]' pyproject.toml; then pip install -e ".[test]" || pip install -e .; fi
      - name: Unit tests
        run: |
          [ -d tests/unit ] || { echo "::notice::нет tests/unit — пропуск"; exit 0; }
          set +e; pytest tests/unit -q; rc=$?
          [ $rc -eq 5 ] && rc=0
          exit $rc

  integration-tests:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
      - name: Install project + test deps (editable; pytest good practices)
        run: |
          pip install pytest
          if grep -q '^\[project\]' pyproject.toml; then pip install -e ".[test]" || pip install -e .; fi
      - name: Integration tests
        run: |
          [ -d tests/integration ] || { echo "::notice::нет tests/integration — пропуск"; exit 0; }
          set +e; pytest tests/integration -q; rc=$?
          [ $rc -eq 5 ] && rc=0
          exit $rc

  codex-review:
    # Отключённый по дефолту action - Особенно для публичных репозиториев есть риск попадания вредоносных инструкций в PR
    # Включить — убрать строку `false &&`
    needs: [unit-tests, integration-tests]
    if: >
      false &&
      github.event.action == 'opened' &&
      github.event.pull_request.head.repo.full_name == github.repository
    runs-on: [self-hosted, codex]
    permissions:
      pull-requests: write
      contents: read
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.base.ref }}
          fetch-depth: 0
      - name: Review PR with Codex (subscription)
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          REPO: ${{ github.repository }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
          BASE_REF: ${{ github.base_ref }}
          HEAD_SHA: ${{ github.event.pull_request.head.sha }}
        run: python3 .github/scripts/codex_review.py
