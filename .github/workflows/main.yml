name: Main CI

# Полный прогон после мержа в main + ручной запуск по кнопке (на любой выбранной
# ветке). Ловит то, что узкий PR-гейт (affected + not heavy) пропускает.
on:
  push:
    branches: [main]
  workflow_dispatch:
    inputs:
      markers:
        description: 'pytest -m (пусто = все; "heavy" — только тяжёлые; "not heavy" — без них)'
        type: string
        default: ''

concurrency:
  group: main-ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  checks:
    uses: ./.github/workflows/_checks.yml

  tests:
    uses: ./.github/workflows/_tests.yml
    with:
      # push в main → все тесты; ручной запуск → что задал в markers
      markers: ${{ inputs.markers || '' }}
