name: Manual — build & deploy

on:
  workflow_dispatch:
    inputs:
      service:
        description: "Services to build (comma-separated, e.g. 'api,worker') or 'all'"
        required: true
        type: string
        default: all
      deploy:
        description: "Deploy after build?"
        required: true
        type: boolean
        default: false
      environment:
        description: "Target environment (must exist in repo Settings → Environments)"
        required: false
        type: string
        default: dev

env:
  REGISTRY: ghcr.io
  IMAGE_PREFIX: ghcr.io/${{ github.repository_owner }}

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - name: Check environment exists
        run: |
          STATUS=$(curl -s -o /dev/null -w "%{http_code}" \
            -H "Authorization: Bearer ${{ secrets.GITHUB_TOKEN }}" \
            -H "Accept: application/vnd.github+json" \
            "https://api.github.com/repos/${{ github.repository }}/environments/${{ inputs.environment }}")
          if [ "$STATUS" != "200" ]; then
            echo "Environment '${{ inputs.environment }}' not found in repo Settings → Environments"
            exit 1
          fi

  build:
    needs: validate
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    outputs:
      tag: ${{ steps.meta.outputs.tag }}
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.ref }}

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set image tag
        id: meta
        run: echo "tag=manual-$(git rev-parse --short HEAD)" >> "$GITHUB_OUTPUT"

      - name: Build and push services
        run: |
          INPUT="${{ inputs.service }}"
          for dir in services/*/; do
            svc=$(basename "$dir")
            if [ "$INPUT" = "all" ] || echo "$INPUT" | tr ',' '\n' | grep -qx "$svc"; then
              docker build -t "${{ env.IMAGE_PREFIX }}/${svc}:${{ steps.meta.outputs.tag }}" "$dir"
              docker push "${{ env.IMAGE_PREFIX }}/${svc}:${{ steps.meta.outputs.tag }}"
            fi
          done

  deploy:
    needs: build
    if: inputs.deploy == true
    runs-on: ubuntu-latest
    environment: ${{ inputs.environment }}
    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_KEY }}
          script: |
            cd ~/ai-framework-cicd
            export GITHUB_REPOSITORY=${{ github.repository }}
            export TAG=${{ needs.build.outputs.tag }}
            INPUT="${{ inputs.service }}"
            if [ "$INPUT" = "all" ]; then
              docker compose pull && docker compose up -d
            else
              SVCS=$(echo "$INPUT" | tr ',' ' ')
              docker compose pull $SVCS && docker compose up -d $SVCS
            fi
