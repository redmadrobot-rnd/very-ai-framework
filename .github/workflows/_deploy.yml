name: Deploy (reusable)

# Выкат стека на хост окружения: preflight конфига → .env из Environment
# Variables/Secrets → scp compose+deploy.sh → ssh deploy.sh. Общий блок для
# deploy-dev, release и manual-deploy. Вызывать с secrets: inherit.
on:
  workflow_call:
    inputs:
      environment:
        description: 'GitHub Environment (dev/prod/…) — источник vars/secrets'
        required: true
        type: string
      tag:
        description: 'тег образов для выката'
        required: true
        type: string
      services:
        description: 'сервисы через пробел; пусто = весь стек'
        type: string
        default: ''

jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    environment: ${{ inputs.environment }}
    permissions:
      contents: read
      packages: read
    concurrency:
      group: deploy-${{ inputs.environment }}
      cancel-in-progress: false
    steps:
      - name: Preflight — конфиг окружения задан
        env:
          SSH_HOST: ${{ vars.SSH_HOST }}
          SSH_USER: ${{ vars.SSH_USER }}
          SSH_KEY: ${{ secrets.SSH_KEY }}
        run: |
          miss=""
          [ -n "$SSH_HOST" ] || miss="$miss SSH_HOST"
          [ -n "$SSH_USER" ] || miss="$miss SSH_USER"
          [ -n "$SSH_KEY" ]  || miss="$miss SSH_KEY"
          [ -z "$miss" ] || { echo "::error::нет конфига ${{ inputs.environment }}:$miss (Environment → Variables/Secrets)"; exit 1; }

      - uses: actions/checkout@v4

      - name: Build .env (${{ inputs.environment }} config)
        env:
          APP_DOTENV: ${{ vars.APP_DOTENV }}
          APP_SECRET: ${{ secrets.APP_SECRET }}
        run: |
          printf '%s\n' "$APP_DOTENV" > .env
          if [ -n "$APP_SECRET" ]; then printf 'APP_SECRET=%s\n' "$APP_SECRET" >> .env; fi

      - name: Copy compose + deploy script + env
        uses: appleboy/scp-action@917f8b81dfc1ccd331fef9e2d61bdc6c8be94634  # v0.1.7
        with:
          host: ${{ vars.SSH_HOST }}
          username: ${{ vars.SSH_USER }}
          key: ${{ secrets.SSH_KEY }}
          source: "docker-compose.yml,.github/scripts/deploy.sh,.env"
          target: "/srv/deploy/${{ github.event.repository.name }}/${{ inputs.environment }}"

      - name: Deploy via SSH
        uses: appleboy/ssh-action@0ff4204d59e8e51228ff73bce53f80d53301dee2  # v1.2.5
        env:
          GHCR_USER: ${{ github.actor }}
          GHCR_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          COMPOSE_PROFILES: ${{ vars.COMPOSE_PROFILES }}
          DEPLOY_ENV: ${{ inputs.environment }}
          DEPLOY_REPO: ${{ github.repository }}
          DEPLOY_PROJECT: ${{ github.event.repository.name }}
          DEPLOY_TAG: ${{ inputs.tag }}
          DEPLOY_SERVICES: ${{ inputs.services }}
        with:
          host: ${{ vars.SSH_HOST }}
          username: ${{ vars.SSH_USER }}
          key: ${{ secrets.SSH_KEY }}
          envs: GHCR_USER,GHCR_TOKEN,COMPOSE_PROFILES,DEPLOY_ENV,DEPLOY_REPO,DEPLOY_PROJECT,DEPLOY_TAG,DEPLOY_SERVICES
          script: >
            bash "/srv/deploy/$DEPLOY_PROJECT/$DEPLOY_ENV/.github/scripts/deploy.sh"
            "$DEPLOY_ENV" "$DEPLOY_REPO" "$DEPLOY_TAG" "$DEPLOY_SERVICES"
