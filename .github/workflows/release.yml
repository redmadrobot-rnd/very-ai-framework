name: Release — promote images & deploy prod

# Триггер: тег v*. Тег может стоять на любом коммите main НЕ раньше текущего прода
# (маркер refs/deploy/prod) — релиз двигает прод только вперёд.
# Шаги: prepare (гейты: тег на main + монотонность; пин каждого образа в digest по :<sha>
#        последнего коммита ≤ тега, менявшего сервис) → tests →
# promote (digest → :vX, тег иммутабелен) → deploy-prod (re-check монотонности → deploy →
# сдвиг refs/deploy/prod). Откат — деплой предыдущего :vX (manual-deploy, build=off).

on:
  push:
    tags:
      - "v*"

env:
  SERVICES_DIR: ${{ vars.SERVICES_DIR || 'services' }}

jobs:
  prepare:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: read
      packages: read
    outputs:
      services: ${{ steps.s.outputs.services }}
      digests: ${{ steps.pin.outputs.digests }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Tag must be on main and not behind current prod
        # Два гейта вместо «тег == HEAD main»:
        # 1) тег на first-parent-истории main — пин образов ищет sha merge-коммитов,
        #    тег на PR-ветке или на боковом коммите нашёл бы не те образы;
        # 2) монотонность: тег — потомок последнего ЗАДЕПЛОЕННОГО прода (маркер
        #    refs/deploy/prod, двигается в конце deploy-prod). Откат кода назад запрещён:
        #    прод-БД видела миграции релизнутого кода, downgrade кода против новой схемы
        #    ломается; сравниваем с маркером, а не с максимальным v-тегом — тег можно
        #    перетегнуть руками, маркер двигает только успешный деплой.
        run: |
          git fetch origin +refs/heads/main:refs/remotes/origin/main --quiet
          # grep без -q: ранний выход grep -q дал бы rev-list SIGPIPE → под pipefail
          # пайплайн = 141 даже при успешном матче
          git rev-list --first-parent refs/remotes/origin/main | grep -x "$GITHUB_SHA" >/dev/null || {
            echo "::error::tag ${GITHUB_REF_NAME} (${GITHUB_SHA}) не на first-parent-истории main. Тег должен стоять на коммите main."
            exit 1
          }
          if git fetch origin '+refs/deploy/prod:refs/deploy/prod' --quiet 2>/dev/null; then
            git merge-base --is-ancestor refs/deploy/prod "$GITHUB_SHA" || {
              PROD_SHA=$(git rev-parse refs/deploy/prod)
              echo "::error::tag ${GITHUB_REF_NAME} (${GITHUB_SHA}) старше текущего прода (${PROD_SHA}). Релиз двигает прод только вперёд; откат — manual-deploy предыдущего :vX (build=off)."
              exit 1
            }
          else
            echo "::notice::refs/deploy/prod не найден — первый релиз, монотонность не проверяем"
          fi

      - id: s
        run: echo "services=$(bash .github/scripts/services.sh list)" >> "$GITHUB_OUTPUT"

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - id: pin
        # Каждый сервис → digest образа :<sha> последнего коммита main, менявшего его
        # каталог. Не :latest — он мог протухнуть (dev-build отменён/упал) → падаем.
        # --first-parent: образы тегируются sha merge-коммита, не коммитов PR-ветки.
        env:
          SERVICES: ${{ steps.s.outputs.services }}
        run: |
          PREFIX=$(echo "ghcr.io/${GITHUB_REPOSITORY}" | tr '[:upper:]' '[:lower:]')
          map='{}'
          for svc in $(printf '%s' "$SERVICES" | jq -r '.[]'); do
            svc_sha=$(git log --first-parent -1 --format=%H -- "$SERVICES_DIR/$svc/")
            if [ -z "$svc_sha" ]; then
              echo "::error::не найден коммит main, менявший $SERVICES_DIR/$svc/ — сервис не под first-parent-историей?"
              exit 1
            fi
            ref="$PREFIX/$svc:$svc_sha"
            if ! digest=$(docker buildx imagetools inspect "$ref" --format '{{.Manifest.Digest}}' 2>/dev/null); then
              echo "::error::образ $ref не найден: dev-build коммита ${svc_sha:0:12} не завершился (отменён или упал). Перезапусти его run «Build changed & deploy dev» (Actions → Re-run jobs), затем re-run release."
              exit 1
            fi
            echo "pin $svc (${svc_sha:0:12}) -> $digest"
            map=$(jq -c --arg s "$svc" --arg d "$digest" '. + {($s): $d}' <<<"$map")
          done
          echo "digests=$map" >> "$GITHUB_OUTPUT"

  # Полный прогон тестов на релизном коммите. Упали → promote/deploy-prod не запустятся.
  tests:
    needs: prepare
    uses: ./.github/workflows/_tests.yml
    with:
      markers: ''

  # Промоут: для каждого сервиса зафиксированный digest -> :<vX>. Без сборки.
  # Один job с циклом, не matrix: операция секундная, 11 раннеров — оверхед.
  # imagetools create идемпотентен, безопасно ре-ранить job целиком.
  promote:
    needs: [prepare, tests]
    if: ${{ needs.prepare.outputs.services != '[]' }}
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      contents: read
      packages: write
    steps:
      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Stamp version onto pinned digests
        env:
          REF: ${{ github.ref_name }}
          DIGESTS: ${{ needs.prepare.outputs.digests }}
        # Не останавливаемся на первом упавшем сервисе (аналог fail-fast: false):
        # промоутим все, кого можем, и падаем в конце со списком проблемных.
        # Версия иммутабельна: :vX уже существует с другим digest → это перетегнутый
        # релиз, молча перезаписывать прод под тем же номером нельзя — падаем.
        # Совпадающий digest — ре-ран этого же релиза, пропускаем (идемпотентность).
        run: |
          PREFIX=$(echo "ghcr.io/${GITHUB_REPOSITORY}" | tr '[:upper:]' '[:lower:]')
          failed=""
          for svc in $(jq -r 'keys[]' <<<"$DIGESTS"); do
            digest=$(jq -r --arg s "$svc" '.[$s]' <<<"$DIGESTS")
            if existing=$(docker buildx imagetools inspect "$PREFIX/$svc:$REF" --format '{{.Manifest.Digest}}' 2>/dev/null); then
              if [ "$existing" = "$digest" ]; then
                echo "skip $svc: :$REF уже указывает на $digest"
                continue
              fi
              echo "::error::$svc:$REF уже выпущен с другим digest ($existing != $digest). Версия иммутабельна — возьми следующий номер."
              failed="$failed $svc"
              continue
            fi
            echo "promote $svc: $digest -> :$REF"
            docker buildx imagetools create -t "$PREFIX/$svc:$REF" "$PREFIX/$svc@$digest" \
              || failed="$failed $svc"
          done
          [ -z "$failed" ] || { echo "::error::promote упал для:$failed"; exit 1; }

  deploy-prod:
    needs: [prepare, promote]
    if: ${{ needs.prepare.outputs.services != '[]' }}
    runs-on: ubuntu-latest
    timeout-minutes: 20
    environment: prod
    permissions:
      contents: write   # двигать маркер refs/deploy/prod после успешного деплоя
      packages: read
    concurrency:
      group: deploy-prod
      cancel-in-progress: false
    steps:
      - name: Preflight — prod-конфиг задан
        env:
          SSH_HOST: ${{ vars.SSH_HOST }}
          SSH_USER: ${{ vars.SSH_USER }}
          SSH_KEY: ${{ secrets.SSH_KEY }}
        run: |
          miss=""
          [ -n "$SSH_HOST" ] || miss="$miss SSH_HOST"
          [ -n "$SSH_USER" ] || miss="$miss SSH_USER"
          [ -n "$SSH_KEY" ]  || miss="$miss SSH_KEY"
          [ -z "$miss" ] || { echo "::error::нет prod-конфига:$miss (Environment prod → Variables/Secrets)"; exit 1; }

      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Re-check — прод не уехал вперёд, пока шли тесты
        # Гейт в prepare мог пройти до того, как ПАРАЛЛЕЛЬНЫЙ релиз задеплоился и сдвинул
        # маркер (напр., его тесты закончились раньше). Повторяем чек под
        # concurrency-замком deploy-prod — деплой поверх более нового релиза отсекается.
        run: |
          if git fetch origin '+refs/deploy/prod:refs/deploy/prod' --quiet 2>/dev/null; then
            git merge-base --is-ancestor refs/deploy/prod "$GITHUB_SHA" || {
              PROD_SHA=$(git rev-parse refs/deploy/prod)
              echo "::error::пока шли тесты, прод уехал на ${PROD_SHA}, tag ${GITHUB_REF_NAME} (${GITHUB_SHA}) теперь позади него. Деплой отменён."
              exit 1
            }
          fi

      - name: Build .env (prod config)
        env:
          APP_DOTENV: ${{ vars.APP_DOTENV }}
          APP_SECRET: ${{ secrets.APP_SECRET }}
        run: |
          printf '%s\n' "$APP_DOTENV" > .env
          if [ -n "$APP_SECRET" ]; then printf 'APP_SECRET=%s\n' "$APP_SECRET" >> .env; fi

      - name: Copy compose + deploy script + env
        uses: appleboy/scp-action@917f8b81dfc1ccd331fef9e2d61bdc6c8be94634  # v0.1.7
        with:
          host: ${{ vars.SSH_HOST }}
          username: ${{ vars.SSH_USER }}
          key: ${{ secrets.SSH_KEY }}
          source: "docker-compose.yml,.github/scripts/deploy.sh,.env"
          target: "/srv/deploy/${{ github.event.repository.name }}/prod"

      - name: Deploy all services to prod
        uses: appleboy/ssh-action@0ff4204d59e8e51228ff73bce53f80d53301dee2  # v1.2.5
        env:
          GHCR_USER: ${{ github.actor }}
          GHCR_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          COMPOSE_PROFILES: ${{ vars.COMPOSE_PROFILES }}
          DEPLOY_REPO: ${{ github.repository }}
          DEPLOY_PROJECT: ${{ github.event.repository.name }}
          DEPLOY_TAG: ${{ github.ref_name }}
        with:
          host: ${{ vars.SSH_HOST }}
          username: ${{ vars.SSH_USER }}
          key: ${{ secrets.SSH_KEY }}
          envs: GHCR_USER,GHCR_TOKEN,COMPOSE_PROFILES,DEPLOY_REPO,DEPLOY_PROJECT,DEPLOY_TAG
          script: >
            bash "/srv/deploy/$DEPLOY_PROJECT/prod/.github/scripts/deploy.sh"
            prod "$DEPLOY_REPO" "$DEPLOY_TAG"

      - name: Advance prod deploy marker
        run: git push --quiet --force origin "${GITHUB_SHA}:refs/deploy/prod"
