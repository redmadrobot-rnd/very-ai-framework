name: Release — build all & deploy prod

on:
  push:
    tags:
      - "v*"

env:
  IMAGE_PREFIX: ghcr.io/${{ github.repository }}

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    outputs:
      tag: ${{ steps.meta.outputs.tag }}
    steps:
      - uses: actions/checkout@v4

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set image tag from git tag
        id: meta
        run: echo "tag=${GITHUB_REF_NAME}" >> "$GITHUB_OUTPUT"

      - name: Build and push api
        uses: docker/build-push-action@v5
        with:
          context: services/api
          push: true
          tags: |
            ${{ env.IMAGE_PREFIX }}/api:${{ steps.meta.outputs.tag }}
            ${{ env.IMAGE_PREFIX }}/api:stable

      - name: Build and push worker
        uses: docker/build-push-action@v5
        with:
          context: services/worker
          push: true
          tags: |
            ${{ env.IMAGE_PREFIX }}/worker:${{ steps.meta.outputs.tag }}
            ${{ env.IMAGE_PREFIX }}/worker:stable

  deploy-prod:
    needs: build
    runs-on: ubuntu-latest
    environment: prod
    steps:
      - uses: actions/checkout@v4
      - name: Build app.env (prod config)
        env:
          APP_DOTENV: ${{ vars.APP_DOTENV }}
          APP_SECRET: ${{ secrets.APP_SECRET }}
        run: |
          printf '%s\n' "$APP_DOTENV" > app.env
          if [ -n "$APP_SECRET" ]; then printf 'APP_SECRET=%s\n' "$APP_SECRET" >> app.env; fi
      - name: Copy compose + deploy script + env
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_KEY }}
          source: "docker-compose.yml,scripts/deploy.sh,app.env"
          target: "/srv/deploy/prod"
      - name: Deploy all services to prod
        uses: appleboy/ssh-action@v1
        env:
          GHCR_USER: ${{ github.actor }}
          GHCR_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_KEY }}
          envs: GHCR_USER,GHCR_TOKEN
          script: bash /srv/deploy/prod/scripts/deploy.sh prod ${{ github.repository }} ${{ needs.build.outputs.tag }}
