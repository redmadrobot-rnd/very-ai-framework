name: Claude Code

on:
  issue_comment:
    types: [created]
  pull_request_review_comment:
    types: [created]

permissions:
  contents: write
  pull-requests: write
  issues: write

jobs:
  claude:
    # Триггер: @claude в комментарии И автор — участник репо (OWNER/MEMBER/COLLABORATOR).
    # БЕЗОПАСНОСТЬ: job имеет contents: write и ПУШИТ коммиты. Guard по author_association
    # не пускает посторонних. На ПУБЛИЧНЫХ репо будь особенно осторожен — не давай
    # запускать форкам/случайным людям (риск злоупотребления записью).
    if: >
      contains(github.event.comment.body, '@claude') &&
      contains(fromJson('["OWNER","MEMBER","COLLABORATOR"]'), github.event.comment.author_association)
    runs-on: ubuntu-latest
    env:
      CLAUDE_CODE_OAUTH_TOKEN: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Claude
        if: env.CLAUDE_CODE_OAUTH_TOKEN != ''
        uses: anthropics/claude-code-action@v1
        with:
          # OAuth-токен подписки Claude Pro/Max вместо API-ключа.
          # Сгенерировать: `claude setup-token` (формат sk-ant-oat01-...).
          # Внимание: расходует квоту твоей подписки — ок для нечастого @claude,
          # для тяжёлого CI Anthropic рекомендует обычный API-ключ.
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          # @claude в комментарии распознаётся автоматически
      - name: Skip notice
        if: env.CLAUDE_CODE_OAUTH_TOKEN == ''
        run: echo "CLAUDE_CODE_OAUTH_TOKEN не задан — @claude не сконфигурирован, пропуск (job зелёный)."
