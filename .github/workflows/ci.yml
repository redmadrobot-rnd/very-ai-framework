name: CI

# Гейт по PR + прогон после мержа в main. На push в feature-ветки CI НЕ запускается —
# до PR качество держит pre-commit (ruff+тесты+секреты) локально. Так нет двойного
# прогона push+pull_request и не тратятся раннеры на промежуточные коммиты.
on:
  pull_request:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: ci-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  lint:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
      - run: pip install ruff==0.14.0
      - name: Lint + format check
        run: |
          ruff check .
          ruff format --check .

  # PR: быстрый прогон — только затронутые окружения, без heavy
  tests-pr:
    if: github.event_name == 'pull_request'
    uses: ./.github/workflows/_tests.yml
    with:
      markers: '-m "not heavy"'
      affected: true

  # push в main / ручной запуск: полный прогон по всем окружениям, включая heavy
  tests-full:
    if: github.event_name != 'pull_request'
    uses: ./.github/workflows/_tests.yml

  security:
    if: "!contains(github.event.head_commit.message, '[skip security]')"
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Secret scan
        # Пин на неизменяемый commit-SHA (не плавающий @main): сторонний action в CI
        # не должен менять поведение без коммита у нас. Обновлять осознанно.
        uses: trufflesecurity/trufflehog@30d5bb91af1a771378349dbbb0c82129392acf70  # v3.95.6
        with:
          extra_args: --only-verified

      - name: SAST
        uses: semgrep/semgrep-action@713efdd345f3035192eaa63f56867b88e63e4e5d  # v1
        with:
          config: p/owasp-top-10

      - name: Deps audit
        run: |
          pip install pip-audit
          if grep -q '^\[project\]' pyproject.toml; then
            pip-audit .                      # читает зависимости из pyproject [project]
          else
            echo "::notice::в pyproject нет [project].dependencies — аудит пропущен"
          fi

  codex-review:
    # ОПЦИЯ (выключена). Авто-ревью Codex при ОТКРЫТИИ PR. Включить — убрать `false &&`.
    # On-demand `@codex review` в комментарии работает всегда (см. codex-command.yml).
    # Осторожно на ПУБЛИЧНЫХ репо: риск инъекции инструкций из чужого PR.
    needs: [tests-pr]
    if: >
      false &&
      github.event_name == 'pull_request' &&
      github.event.action == 'opened' &&
      github.event.pull_request.head.repo.full_name == github.repository
    runs-on: [self-hosted, codex]
    timeout-minutes: 20
    permissions:
      pull-requests: write
      contents: read
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.base.ref }}
          fetch-depth: 0
      - name: Review PR with Codex (subscription)
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          REPO: ${{ github.repository }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
          BASE_REF: ${{ github.base_ref }}
          HEAD_SHA: ${{ github.event.pull_request.head.sha }}
        run: python3 .github/scripts/codex_review.py
