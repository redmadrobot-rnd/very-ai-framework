name: Build changed & deploy dev

# Автоматика на мерж в main. Собираем образы ТОЛЬКО сервисов с изменённым кодом
# Деплоим по :latest: изменённые сервисы если yt менялся конфиг стека (compose/deploy.sh)
on:
  push:
    branches: [main]

# Только самый свежий пуш в main доводится до конца: медленный build старого
# коммита отменяется и не может перезаписать :latest ПОЗЖЕ нового (иначе dev
# откатился бы на старый образ). Для dev это «последний коммит побеждает».
concurrency:
  group: deploy-dev-pipeline
  cancel-in-progress: true

env:
  SERVICES_DIR: ${{ vars.SERVICES_DIR || 'services' }}

jobs:
  plan:
    # build — что пересобирать; deploy — что выкатывать (может быть шире build)
    runs-on: ubuntu-latest
    timeout-minutes: 10
    outputs:
      build: ${{ steps.p.outputs.build }}
      deploy: ${{ steps.p.outputs.deploy }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - id: p
        shell: bash
        env:
          BEFORE: ${{ github.event.before }}
          SHA: ${{ github.sha }}
        run: |
          # Диффим от маркера refs/deploy/dev — последнего УСПЕШНО задеплоенного
          # коммита (двигается в конце deploy-dev), а не от github.event.before.
          # Это делает набор пересборки идемпотентным к прерыванию: если build
          # предыдущего пуша отменил cancel-in-progress, его недособранные сервисы
          # снова попадут в дифф — от before они бы потерялись. Фолбэк на before —
          # первый прогон, когда маркера ещё нет.
          git fetch --quiet origin '+refs/deploy/dev:refs/deploy/dev' 2>/dev/null || true
          base=$(git rev-parse -q --verify refs/deploy/dev 2>/dev/null || echo "$BEFORE")
          build=$(bash .github/scripts/services.sh changed "$base" "$SHA")
          # deploy — по умолчанию = build; правка конфига стека → редеплой ВСЕХ
          deploy="$build"
          if git rev-parse -q --verify "${base}^{commit}" >/dev/null 2>&1 \
             && git diff --name-only "$base" "$SHA" \
                | grep -qE '^(docker-compose\.yml|\.github/scripts/deploy\.sh)$'; then
            deploy=$(bash .github/scripts/services.sh list)
          fi
          echo "build=$build"   >> "$GITHUB_OUTPUT"
          echo "deploy=$deploy" >> "$GITHUB_OUTPUT"
          echo "::notice::build=$build deploy=$deploy"

  build:
    needs: plan
    if: ${{ needs.plan.outputs.build != '[]' }}
    permissions:
      contents: read
      packages: write
    uses: ./.github/workflows/_build.yml
    with:
      services: ${{ needs.plan.outputs.build }}
      tags: ${{ github.sha }} latest

  deploy-dev:
    needs: [plan, build]
    # always(): при правке только конфига стека build пустой/скипнут, но деплой нужен.
    # При этом не деплоим, если build реально упал.
    if: >-
      ${{ always() && needs.plan.outputs.deploy != '[]'
          && needs.plan.result == 'success'
          && (needs.build.result == 'success' || needs.build.result == 'skipped') }}
    permissions:
      contents: read
      packages: read
    # dev деплоим по :latest — единый тег для всего deploy-набора: и только что
    # пересобранных сервисов, и незатронутых при редеплое конфига стека.
    uses: ./.github/workflows/_deploy.yml
    secrets: inherit
    with:
      environment: dev
      tag: latest
      services: ${{ join(fromJson(needs.plan.outputs.deploy), ' ') }}

  marker:
    # refs/deploy/dev двигается только после успешного деплоя (см. комментарий в plan);
    # deploy-dev скипнут/упал → job скипается по умолчанию needs-семантики.
    needs: deploy-dev
    runs-on: ubuntu-latest
    timeout-minutes: 5
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      - name: Advance dev deploy marker
        run: git push --quiet --force origin "${GITHUB_SHA}:refs/deploy/dev"
