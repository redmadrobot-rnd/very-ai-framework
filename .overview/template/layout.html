<!doctype html>
<html lang="ru">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{{ site_name }} — {{ page_title }}</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <header class="bar">
    <div class="wrap">
      <span class="name">{{ site_name }}</span>
      <nav>
        <a href="index.html" class="{{ 'active' if page == 'index' else '' }}">Overview</a>
        <a href="tech.html" class="{{ 'active' if page == 'tech' else '' }}">Tech</a>
      </nav>
    </div>
  </header>
  <main>
    {{ content }}
  </main>
  <footer>
    <div class="wrap">Сгенерировано агентом на релизе <code>{{ release }}</code> · {{ generated }}</div>
  </footer>
</body>
</html>
