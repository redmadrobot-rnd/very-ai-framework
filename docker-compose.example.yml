services:
  api:
    image: ${IMAGE_PREFIX}/api:${TAG:-latest}
    env_file:
      - .env
    ports:
      - "8080:8080"
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:8080/health"]
      interval: 10s
      timeout: 3s
      retries: 5
      start_period: 20s

  worker:
    image: ${IMAGE_PREFIX}/worker:${TAG:-latest}
    env_file:
      - .env
    restart: unless-stopped
