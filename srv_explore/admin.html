<!doctype html>
<html lang="ru">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>srv-explore · admin</title>
<style>
  :root {
    --bg:#0d1117; --surface:#161b22; --surface2:#0f141a; --bd:#30363d;
    --tx:#e6edf3; --mut:#8b949e; --acc:#2f81f7; --acc-h:#4b9bff;
    --green:#3fb950; --red:#f85149; --amber:#d29922;
    --radius:10px;
  }
  * { box-sizing: border-box; }
  html { color-scheme: dark; }
  body {
    font: 14px/1.55 system-ui, -apple-system, "Segoe UI", sans-serif;
    margin: 0; padding: 2rem 1.25rem 4rem; color: var(--tx);
    background: radial-gradient(1200px 600px at 80% -10%, #1b2432 0%, var(--bg) 55%) fixed;
    -webkit-font-smoothing: antialiased;
  }
  .wrap { max-width: 1080px; margin: 0 auto; }
  header { display: flex; align-items: baseline; gap: .6rem; flex-wrap: wrap; margin-bottom: .25rem; }
  h1 { font-size: 1.15rem; font-weight: 650; margin: 0; letter-spacing: .2px; }
  h1 .dot { color: var(--acc); }
  .badge { font-size: .72rem; color: var(--mut); border: 1px solid var(--bd); border-radius: 999px; padding: .1rem .55rem; }
  .sub { color: var(--mut); margin: 0 0 1.6rem; font-size: .9rem; }
  h2 { font-size: .82rem; text-transform: uppercase; letter-spacing: .08em; color: var(--mut); font-weight: 600; margin: 2rem 0 .7rem; display: flex; align-items: center; gap: .5rem; }
  h2 .rl { margin-left: auto; }

  .card { background: var(--surface); border: 1px solid var(--bd); border-radius: var(--radius); padding: 1.1rem 1.2rem; box-shadow: 0 1px 0 #ffffff08 inset, 0 8px 24px #0006; }
  .bar { display: flex; gap: .6rem; align-items: center; flex-wrap: wrap; }

  label { color: var(--mut); font-size: .85rem; display: inline-flex; align-items: center; gap: .45rem; }
  input, select {
    font: inherit; padding: .5rem .7rem; border: 1px solid var(--bd); border-radius: 8px;
    background: var(--surface2); color: var(--tx); outline: none; transition: border-color .15s, box-shadow .15s;
  }
  input::placeholder { color: #5b636d; }
  input:focus, select:focus { border-color: var(--acc); box-shadow: 0 0 0 3px #2f81f733; }
  button {
    font: inherit; font-weight: 550; padding: .5rem .85rem; border-radius: 8px; cursor: pointer;
    border: 1px solid var(--bd); background: #1d232c; color: var(--tx); transition: background .15s, border-color .15s, transform .05s;
  }
  button:hover { background: #232b35; }
  button:active { transform: translateY(1px); }
  button.primary { background: var(--acc); border-color: var(--acc); color: #fff; }
  button.primary:hover { background: var(--acc-h); }
  button.danger { background: transparent; border-color: #5c2b2b; color: #ff7b72; }
  button.danger:hover { background: #f851491a; border-color: var(--red); }
  button.rl { padding: .2rem .5rem; font-size: .8rem; color: var(--mut); }

  table { border-collapse: collapse; width: 100%; }
  thead th { text-align: left; font-size: .72rem; text-transform: uppercase; letter-spacing: .06em; color: var(--mut); font-weight: 600; padding: .5rem .7rem; border-bottom: 1px solid var(--bd); }
  tbody td { padding: .6rem .7rem; border-bottom: 1px solid #21262d; vertical-align: top; }
  tbody tr:last-child td { border-bottom: 0; }
  tbody tr:hover td { background: #ffffff05; }
  .tbl-card { padding: .3rem .4rem; }

  code, pre { font-family: ui-monospace, "SF Mono", Menlo, Consolas, monospace; font-size: .85em; }
  code.id { color: #a5d6ff; background: #1f6feb1a; padding: .05rem .4rem; border-radius: 5px; }
  pre { white-space: pre-wrap; word-break: break-word; margin: 0; }

  .tok { background: #3fb9501a; border: 1px solid #2ea04366; border-radius: 8px; padding: .7rem .9rem; margin: .9rem 0 .2rem; }
  .tok code { display: inline-block; margin-top: .35rem; color: #7ee787; word-break: break-all; font-size: .95em; }
  .pill { font-size: .74rem; padding: .12rem .55rem; border-radius: 999px; border: 1px solid var(--bd); color: var(--mut); }
  .st { font-size: .74rem; padding: .12rem .55rem; border-radius: 999px; font-weight: 600; text-transform: uppercase; letter-spacing: .04em; border: 1px solid; }
  .running { color: var(--amber); border-color: #d2992255; background: #d299221a; }
  .done { color: var(--green); border-color: #2ea04355; background: #3fb9501a; }
  .error { color: var(--red); border-color: #f8514955; background: #f851491a; }
  .err { color: #ff7b72; }
  .muted { color: var(--mut); }

  details summary { cursor: pointer; color: var(--acc); }
  details summary:hover { color: var(--acc-h); }
  details pre { margin-top: .5rem; padding: .7rem .8rem; background: var(--surface2); border: 1px solid var(--bd); border-radius: 8px; }

  #audit { color: var(--mut); background: var(--surface2); max-height: 340px; overflow: auto; }
  #authmsg { font-size: .85rem; }
  .gap { margin-top: 1rem; }
</style>
</head>
<body>
<div class="wrap">
  <header>
    <h1>srv-explore <span class="dot">·</span> admin</h1>
    <span class="badge">env: <b id="env">—</b></span>
  </header>
  <p class="sub">Управление доступом, история сессий и аудит — без SSH к серверу.</p>

  <div class="card bar">
    <label>Админ-токен <input id="admtok" type="password" placeholder="adm_…" size="32"></label>
    <button class="primary" onclick="saveToken()">Войти</button>
    <span id="authmsg" class="muted"></span>
  </div>

  <div id="app" style="display:none">
    <h2>Токены доступа <span class="muted" style="text-transform:none;letter-spacing:0;font-weight:400">— пользователи</span></h2>
    <div class="card">
      <div class="bar">
        <input id="lbl" placeholder="кому / зачем (label)" size="24">
        <select id="tenv"></select>
        <button class="primary" onclick="issue()">Выпустить токен</button>
      </div>
      <div id="issued"></div>
      <div class="gap tbl-card">
        <table id="toktbl"><thead><tr><th>id</th><th>label</th><th>env</th><th>создан</th><th></th></tr></thead><tbody></tbody></table>
      </div>
    </div>

    <h2>История сессий <span class="rl"><button class="rl" onclick="loadRuns()">⟳ обновить</button></span></h2>
    <div class="card tbl-card">
      <table id="runtbl"><thead><tr><th>время</th><th>кто</th><th>задача</th><th>статус</th><th>итог</th></tr></thead><tbody></tbody></table>
    </div>

    <h2>Аудит команд <span class="rl"><button class="rl" onclick="loadAudit()">⟳ обновить</button></span></h2>
    <pre id="audit" class="card">—</pre>
  </div>
</div>

<script>
const $ = s => document.querySelector(s);
function tok() { return sessionStorage.getItem("admtok") || ""; }
function hdr() { return { "Authorization": "Bearer " + tok(), "Content-Type": "application/json" }; }
function esc(s) { return (s ?? "").toString().replace(/[&<>]/g, c => ({"&":"&amp;","<":"&lt;",">":"&gt;"}[c])); }

async function api(path, opts) {
  const r = await fetch(path, Object.assign({ headers: hdr() }, opts || {}));
  if (r.status === 401) throw new Error("неверный админ-токен");
  return r;
}

function saveToken() {
  sessionStorage.setItem("admtok", $("#admtok").value.trim());
  boot();
}

async function boot() {
  if (!tok()) { $("#authmsg").textContent = "введи админ-токен"; return; }
  try {
    await loadTokens();
    $("#app").style.display = "";
    $("#authmsg").textContent = "";
    $("#authmsg").className = "muted";
    loadRuns(); loadAudit();
  } catch (e) {
    $("#app").style.display = "none";
    $("#authmsg").textContent = e.message;
    $("#authmsg").className = "err";
  }
}

async function loadTokens() {
  const d = await (await api("/admin/api/tokens")).json();
  $("#env").textContent = d.env;
  const sel = $("#tenv");
  if (!sel.options.length) {
    for (const e of ["dev", "prod"]) { const o = document.createElement("option"); o.value = o.textContent = e; if (e === d.env) o.selected = true; sel.appendChild(o); }
  }
  const tb = $("#toktbl tbody"); tb.innerHTML = "";
  for (const t of d.tokens) {
    const tr = document.createElement("tr");
    tr.innerHTML = `<td><code class="id">${esc(t.id)}</code></td><td>${esc(t.label)}</td><td><span class="pill">${esc(t.env)}</span></td><td class="muted">${esc(t.created)}</td>
      <td><button class="danger" onclick="revoke('${esc(t.id)}')">отозвать</button></td>`;
    tb.appendChild(tr);
  }
  if (!d.tokens.length) tb.innerHTML = `<tr><td colspan="5" class="muted">нет выданных токенов</td></tr>`;
}

async function issue() {
  const label = $("#lbl").value.trim();
  if (!label) { alert("укажи label"); return; }
  const r = await api("/admin/api/tokens", { method: "POST", body: JSON.stringify({ label, env: $("#tenv").value }) });
  const d = await r.json();
  if (!r.ok) { alert(d.error || "ошибка"); return; }
  $("#lbl").value = "";
  $("#issued").innerHTML = `<div class="tok">Токен для <b>${esc(d.record.label)}</b> (${esc(d.record.env)}) — покажется <b>один раз</b>, скопируй и отдай инженеру:<br><code>${esc(d.token)}</code></div>`;
  loadTokens();
}

async function revoke(id) {
  if (!confirm("Отозвать токен " + id + "?")) return;
  await api("/admin/api/tokens/" + encodeURIComponent(id) + "/revoke", { method: "POST" });
  loadTokens();
}

async function loadRuns() {
  const d = await (await api("/admin/api/runs")).json();
  const tb = $("#runtbl tbody"); tb.innerHTML = "";
  for (const r of d.runs) {
    const out = r.status === "error" ? `<span class="err">${esc(r.error)}</span>`
      : (r.result ? `<details><summary>показать</summary><pre>${esc(r.result)}</pre></details>` : "—");
    const tr = document.createElement("tr");
    tr.innerHTML = `<td class="muted">${esc(r.started)}</td><td>${esc(r.label)}</td><td>${esc(r.task)}</td>
      <td><span class="st ${esc(r.status)}">${esc(r.status)}</span></td><td>${out}</td>`;
    tb.appendChild(tr);
  }
  if (!d.runs.length) tb.innerHTML = `<tr><td colspan="5" class="muted">пока нет прогонов</td></tr>`;
}

async function loadAudit() {
  const d = await (await api("/admin/api/audit")).json();
  $("#audit").textContent = d.lines.length ? d.lines.join("\n") : "аудит пуст";
}

$("#admtok").addEventListener("keydown", e => { if (e.key === "Enter") saveToken(); });
if (tok()) { $("#admtok").value = tok(); boot(); }
</script>
</body>
</html>
