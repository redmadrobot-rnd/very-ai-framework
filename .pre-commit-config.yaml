repos:
  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.14.0
    hooks:
      - id: ruff
        args: [--fix]
      - id: ruff-format

  - repo: https://github.com/Yelp/detect-secrets
    rev: v1.5.0
    hooks:
      - id: detect-secrets
        args: ["--disable-plugin", "KeywordDetector"]

  - repo: local
    hooks:
      - id: gitmark-lint
        name: KB lint
        entry: bash .github/scripts/gitmark.sh lint --strict
        language: system
        pass_filenames: false
        files: \.md$
